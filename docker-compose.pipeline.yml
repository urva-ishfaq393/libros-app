services:
  db:
    image: mysql:8.0
    container_name: libros-db-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: libros_db
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  libros-web:
    build: .
    container_name: libros-web-test
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: libros_db
      SECRET_KEY: superSecretKey456
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 10

  tests:
    build:
      context: ./libros-tests
    container_name: libros-tests
    depends_on:
      libros-web:
        condition: service_healthy
    networks:
      - test-net
    volumes:
      - ./test-results:/tests

networks:
  test-net:
    driver: bridge
